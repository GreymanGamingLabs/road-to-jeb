<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Road to Jeb - Minecraft Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🐑 The Road to Jeb ⛏️</h1>
    <p class="subtitle">Answer Minecraft trivia to race to Jeb the Rainbow Sheep!</p>

    <div class="card" id="quizCard">
      <span class="badge" id="cardBadge">Question</span>
      <div class="content" id="cardContent">Loading...</div>
      <p class="hint" id="cardHint">Click the card to reveal the answer</p>
    </div>

    <div class="controls">
      <button id="nextBtn">Next Question ➡️</button>
    </div>
  </div>

  <script src="questions.js"></script>
  <script src="script.js"></script>
</body>
</html>
