<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌈 The Road to Jeb</title>

    <!-- Google Pixel Font -->
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <header>
        <h1>🌈 THE ROAD TO JEB 🐑</h1>
        <p class="subtitle">
            Answer Minecraft questions and be the first to reach Jeb!
        </p>
    </header>

    <main>

        <div id="home-screen">

            <button id="start-btn">
                ▶ START GAME
            </button>

        </div>

        <div id="game-screen" class="hidden">

            <div class="player-turn">
                <h2 id="player-turn">Player 1's Turn</h2>
            </div>

            <div class="counter">
                Question <span id="question-count">1</span> /
                <span id="question-total">300</span>
            </div>

            <div class="question-card">

                <h2 id="question">
                    Press START to begin!
                </h2>

            </div>

            <div id="answer-card" class="answer-card hidden">

                <h3>Answer</h3>

                <p id="answer"></p>

            </div>

            <div class="buttons">

                <button id="reveal-btn">
                    👀 Reveal Answer
                </button>

                <button id="next-btn">
                    ➜ Next Question
                </button>

            </div>

        </div>

    </main>

    <footer>

        <p>
            🌈 The Road to Jeb
        </p>

        <small>
            Version 0.3
        </small>

    </footer>

</div>

<script src="questions.js"></script>
<script src="script.js"></script>

</body>
</html>
